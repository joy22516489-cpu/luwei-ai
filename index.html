 <input type="file" accept="image/*" id="imageUpload">

  <br><br>

  <img id="preview" width="250">

  <h3 id="result">辨識結果：尚未辨識</h3>

  <h3 id="price">價格：0 元</h3>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <script>

    const URL = "https://teachablemachine.withgoogle.com/models/hn-M_gLKS/";

    let model;

    async function init() {

      model = await tmImage.load(
        URL + "model.json",
        URL + "metadata.json"
      );

      console.log("模型載入成功");

    }

    function getPrice(name) {

      if (name === "米血") return 25;

      if (name === "一顆貢丸") return 10;

      if (name === "兩顆貢丸") return 20;

      if (name === "三顆貢丸") return 30;

      return 0;
    }

    document.getElementById("imageUpload").addEventListener("change", async function (event) {

      const file = event.target.files[0];

      const img = document.getElementById("preview");

      img.src = window.URL.createObjectURL(file);

      img.onload = async function () {

        const prediction = await model.predict(img);

        prediction.sort((a, b) => b.probability - a.probability);

        const item = prediction[0].className;

        const percent = (prediction[0].probability * 100).toFixed(1);

        const price = getPrice(item);

        document.getElementById("result").innerText =
          "辨識結果：" + item + "（" + percent + "%）";

        document.getElementById("price").innerText =
          "價格：" + price + " 元";

      };

    });

    init();

  </script>

</body>

</html>
